name: Update ICC.m3u
on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'
permissions:
  contents: write
jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch files from hosting
      run: |
        curl -L -o ICC.m3u "https://raw.githubusercontent.com/doctor-8trange/nexphi0/refs/heads/main/data/icc.m3u"
        curl -L -o Fifa.m3u "https://raw.githubusercontent.com/srhady/fifaplus/refs/heads/main/fifa_live.m3u"

    - name: Commit and push changes
      run: |
        git config --global user.name "sportlive18"
        git config --global user.email "271363488+sportlive18@users.noreply.github.com"

        git add ICC.m3u Fifa.m3u

        if git diff --cached --quiet; then
          echo "No changes in ICC.m3u or Fifa.m3u, skipping commit."
        else
          git commit -m "Automated update of ICC.m3u and Fifa.m3u"
          git push origin HEAD:main
        fi
