name: Update Willow Stream

on:
  schedule:
    - cron: '*/25 * * * *' # Runs every 30 minutes
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' # Using a specific version is good practice
    
    - name: Install dependencies from requirements.txt
      run: pip install -r requirements.txt

    - name: Run willow_scraper.py
      run: python willow_scraper.py

    - name: Commit and push if there are changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add siamscrichd.m3u
        # The 'git diff' command checks if the file has changed. If it has, it commits and pushes.
        # This prevents empty commits.
        git diff --staged --quiet || (git commit -m "Update siamscrichd.m3u stream" && git push)
